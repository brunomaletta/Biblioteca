<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">

  <style>
    #dark { display:none; }
    html[data-dark-mode] #light { display:none; }
    html[data-dark-mode] #dark { display:inline; }
  </style>

  <image id="light" href="/Biblioteca/images/logo_black.png" width="100%" height="100%"/>
  <image id="dark"  href="/Biblioteca/images/logo_white.png" width="100%" height="100%"/>

</svg>
